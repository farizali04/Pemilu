<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — DataPilih</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 25%);
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo {
      font-size: 40px;
      margin-bottom: 15px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--text3);
      margin-top: 5px;
    }
  </style>
  <script src="/js/auth.js"></script>
</head>
<body>

<div class="login-box">
  <div class="login-header">
    <div class="login-logo">🗳️</div>
    <div class="login-title">Data<span style="color:var(--primary);">Pilih</span></div>
    <div class="login-subtitle">Sistem Intelijen Data Politik</div>
  </div>

  <div id="alert-error" class="alert alert-danger" style="display:none;margin-bottom:20px;"></div>
  <div id="alert-warning" class="alert alert-warning" style="display:none;margin-bottom:20px;"></div>

  <form id="form-login" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="inp-username" class="form-control" placeholder="Masukkan username" required autofocus autocomplete="username" />
    </div>
    
    <div class="form-group" style="margin-bottom:30px;">
      <label>Password</label>
      <input type="password" id="inp-password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
    </div>

    <button type="submit" id="btn-login" class="btn btn-primary" style="width:100%;">Masuk Sistem</button>
  </form>
</div>

<script>
  // Tampilkan warning jika redirect karena expired
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('expired')) {
    const warn = document.getElementById('alert-warning');
    warn.textContent = 'Sesi Anda telah berakhir. Silakan login kembali.';
    warn.style.display = 'block';
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('alert-error');
    err.style.display = 'none';
    
    const username = document.getElementById('inp-username').value.trim();
    const password = document.getElementById('inp-password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;margin-right:6px;vertical-align:middle;"></span> Memverifikasi...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        err.textContent = data.error || 'Login gagal';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Masuk Sistem';
        return;
      }

      // Login sukses, simpan token
      localStorage.setItem('token', data.token);
      localStorage.setItem('userRole', data.user.role);
      localStorage.setItem('username', data.user.username);
      localStorage.setItem('idKader', data.user.idKader || '');
      localStorage.setItem('namaKader', data.user.namaKader || '');

      // Redirect ke dashboard
      window.location.href = '/';
      
    } catch (error) {
      err.textContent = 'Koneksi ke server gagal.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Masuk Sistem';
    }
  }
</script>

</body>
</html>
