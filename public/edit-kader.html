<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Kader — Pendataan</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <script src="/js/auth.js"></script>
</head>
<body>

<header>
  <div class="container header-inner">
    <a href="/" class="logo">
      <div class="logo-icon">🗳️</div>
      <div class="logo-text">Data<span>Pilih</span></div>
    </a>
    <nav class="nav">
      <a href="/">📊 Dashboard</a>
      <a href="/tambah-pemilih">➕ Tambah</a>
      <a href="/import">📥 Import</a>
      <a href="/kader" class="active">🎖️ Kader</a>
      <a href="/log-duplikat">🔍 Log</a>
    </nav>
  </div>
</header>

<div class="container-sm">
  <div class="page-header">
    <div class="breadcrumb">
      <a href="/">Dashboard</a> › <a href="/kader">Kader</a> › <span>Edit Kader</span>
    </div>
    <h1>Edit Data Kader</h1>
    <p>Perbarui informasi kader yang sudah terdaftar.</p>
  </div>

  <div id="loading-wrap" class="card" style="text-align:center;padding:50px;">
    <div class="loading"><span class="spinner"></span> Memuat data…</div>
  </div>

  <div id="form-wrap" style="display:none;">
    <div class="card">
      <div class="card-title"><div class="card-icon ci-orange">✏️</div> Form Edit Kader</div>

      <input type="hidden" id="edit-id"/>

      <div id="alert-success" class="alert-success"></div>
      <div id="alert-error" class="alert-error"></div>

      <div class="form-group">
        <label>Nama Kader <span style="color:var(--danger);">*</span></label>
        <input type="text" id="kader-nama" placeholder="Nama kader…" autocomplete="off"/>
      </div>

      <div class="form-group">
        <label>Nomor Kader <span style="color:var(--danger);">*</span></label>
        <input type="number" id="kader-nomor" placeholder="Nomor urut kader" min="1"/>
      </div>

      <div class="form-group">
        <label>Target Suara</label>
        <input type="number" id="kader-target" placeholder="Contoh: 500" min="0"/>
        <div class="hint">Target jumlah pemilih yang harus dikumpulkan kader ini.</div>
      </div>

      <div class="gap-12" style="margin-top:8px;">
        <a href="/kader" class="btn btn-outline" style="flex:1;justify-content:center;">← Batal</a>
        <button class="btn btn-primary" style="flex:2;" onclick="submitEditKader()">💾 Simpan Perubahan</button>
      </div>
    </div>
  </div>

  <div id="notfound-wrap" style="display:none;" class="card">
    <div class="empty"><div class="empty-icon">❌</div><p>Kader tidak ditemukan. <a href="/kader" style="color:var(--accent);">Kembali</a></p></div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/kader.js"></script>
<script src="/js/form-kader.js"></script>
<script>
  function showToast(msg, emoji='✅') {
    const t = document.getElementById('toast');
    t.innerHTML = `${emoji} ${msg}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function init() {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { showPage('notfound'); return; }

    const data = await KaderAPI.getById(id);
    if (data.error) { showPage('notfound'); return; }

    document.getElementById('edit-id').value      = data.id;
    document.getElementById('kader-nama').value   = data.nama;
    document.getElementById('kader-nomor').value  = data.nomor;
    document.getElementById('kader-target').value = data.target_suara || '';
    showPage('form');
  }

  function showPage(page) {
    document.getElementById('loading-wrap').style.display  = 'none';
    document.getElementById('form-wrap').style.display     = page === 'form'     ? 'block' : 'none';
    document.getElementById('notfound-wrap').style.display = page === 'notfound' ? 'block' : 'none';
  }

  init();
</script>
</body>
</html>
